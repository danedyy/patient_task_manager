name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache the fvm-managed Flutter SDK, keyed on the pinned version in .fvmrc.
      - uses: actions/cache@v4
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ hashFiles('.fvmrc') }}

      # Install fvm and put it on PATH for later steps. GITHUB_PATH only affects
      # subsequent steps, so the SDK install lives in its own step below.
      - name: Install fvm
        run: |
          curl -fsSL https://fvm.app/install.sh | bash
          echo "$HOME/fvm/bin" >> "$GITHUB_PATH"

      # Install the SDK version from .fvmrc, so CI uses the same toolchain source
      # of truth as local dev (no version duplicated here).
      - name: Install pinned Flutter SDK
        run: fvm install

      - run: fvm flutter pub get
      
      - run: fvm dart run build_runner build --delete-conflicting-outputs

      - run: fvm flutter analyze

      - run: fvm flutter test
